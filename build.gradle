plugins
{
	id 'java'
	id 'application'
}

// Java configuration.
java
{
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

// Entry point.
application
{
	mainClass = 'simplecraft.SimpleCraft'
}

repositories
{
	mavenCentral()
}

// JMonkeyEngine version - 3.9.0
def jmeVersion = '3.9.0-stable'

dependencies
{
	// --- jMonkeyEngine Core ---
	implementation "org.jmonkeyengine:jme3-core:${jmeVersion}"
	implementation "org.jmonkeyengine:jme3-desktop:${jmeVersion}"
	implementation "org.jmonkeyengine:jme3-lwjgl3:${jmeVersion}"
	implementation "org.jmonkeyengine:jme3-effects:${jmeVersion}"
	implementation "org.jmonkeyengine:jme3-plugins:${jmeVersion}"
	implementation "org.jmonkeyengine:jme3-jogg:${jmeVersion}"

	// --- Lemur UI ---
	implementation 'com.simsilica:lemur:1.16.0'
	implementation 'com.simsilica:lemur-proto:1.13.0'

	// --- OpenSimplex2 noise is a single .java file dropped into src, no dependency needed. ---
}

// Make sure assets folder is available at runtime but not bundled in JAR.
sourceSets
{
	main
	{
		resources
		{
			// Only include properties files, etc. from resources, not assets.
			srcDirs 'src/main/resources'
		}
	}
}

// Handle duplicate files in resources.
processResources
{
	duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

// Configure JAR to be runnable (fat JAR with all dependencies).
jar
{
	manifest
	{
		attributes 'Build-By': System.getProperty('user.name')
		attributes 'Build-Date': new Date().format('yyyy-MM-dd HH:mm:ss z')
		attributes 'Build-JDK': "${System.getProperty('java.version')} (${System.getProperty('java.vendor')})"
		attributes 'Created-By': 'Gradle ' + gradle.gradleVersion
		attributes 'Implementation-Title': project.name
		attributes 'Main-Class': application.mainClass.get()
	}

	// Bundle all dependencies into the JAR for easy distribution.
	from
	{
		configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
	}

	// Exclude assets and bat file from being bundled in the JAR.
	exclude 'assets/**'
	exclude 'SimpleCraft.bat'
	
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// JVM args for running.
run
{
	jvmArgs =
	[
		'--add-opens=java.base/java.lang=ALL-UNNAMED',
		'--add-opens=java.base/java.nio=ALL-UNNAMED',
		'--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
		'--add-opens=java.base/java.lang.reflect=ALL-UNNAMED'
	]
}

// Disable the default distribution tasks.
distZip
{
	enabled = false
}
distTar
{
	enabled = false
}
installDist
{
	enabled = false
}
startScripts
{
	enabled = false
}

// Create a custom distribution task.
task createCustomDist(type: Zip) {
	archiveFileName = 'SimpleCraft.zip'
	destinationDirectory = file('build/distributions')
	
	// Include launchers at the root.
	from('src/main/resources')
	{
		include 'SimpleCraft.bat'
		include 'SimpleCraft.sh'
	}
	
	// Include assets folder (not bundled in JAR).
	from('assets')
	{
		into 'assets'
	}
	
	// Include license and readme.
	from(rootDir)
	{
		include 'LICENSE.txt'
		include 'README.md'
	}
	
	// Include the fat JAR at the root.
	from(jar)
	{
		rename { 'SimpleCraft.jar' }
	}
}

// Make the custom task depend on the jar.
createCustomDist.dependsOn jar

// Override the assembleDist task to use our custom distribution.
assembleDist
{
	dependsOn createCustomDist
}

// Also override the build task to ensure our distribution is built.
build
{
	dependsOn createCustomDist
}

// ─── Standalone package (embedded JRE, no Java install required) ─────────────
//
// Usage:  gradlew standalonePackage
// Output: build/dist/SimpleCraft/  (contains SimpleCraft.exe on Windows)
//
// Requires jpackage on PATH — included with JDK 14+.
// Build on the TARGET platform: Windows .exe must be built on Windows,
// Linux binary must be built on Linux. Cross-compilation is not supported.

// Delete previous jpackage output so it doesn't merge with a stale build.
task cleanPackage(type: Delete) {
	delete "${buildDir}/packaged/SimpleCraft"
}

// Run jpackage to produce an app-image (directory, not an installer).
// The bundled JRE means players do not need Java installed.
task packageApp(type: Exec) {
	dependsOn jar, cleanPackage

	commandLine 'jpackage',
		'--input',       "${buildDir}/libs",
		'--main-jar',    "${project.name}.jar",
		'--name',        'SimpleCraft',
		'--type',        'app-image',
		'--app-version', '1.0.0',
		'--dest',        "${buildDir}/packaged",
		// Required JVM flags — mirrored from the run task and SimpleCraft.bat.
		'--java-options', '--add-opens=java.base/java.lang=ALL-UNNAMED',
		'--java-options', '--add-opens=java.base/java.nio=ALL-UNNAMED',
		'--java-options', '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED',
		'--java-options', '--add-opens=java.base/java.lang.reflect=ALL-UNNAMED',
		// Icon: pick the right format for the current build platform.
		'--icon', org.gradle.internal.os.OperatingSystem.current().isWindows() ? 'src/main/resources/icon.ico'
		        : org.gradle.internal.os.OperatingSystem.current().isMacOsX()  ? 'src/main/resources/icon.icns'
		        :                                                                  'src/main/resources/icon.png'
}

// Copy the assets folder next to the packaged executable.
// jME3 loads assets from the working directory, not the classpath.
task copyAssetsToPackage(type: Copy) {
	dependsOn packageApp
	from 'assets'
	into "${buildDir}/packaged/SimpleCraft/assets"
}

// Top-level task: build fat JAR -> jpackage -> copy assets.
task standalonePackage {
	dependsOn copyAssetsToPackage
	group = 'distribution'
	description = 'Creates a self-contained app-image with bundled JRE — no Java install required.'
	doLast
	{
		println ""
		println "Standalone package created at: build/package/SimpleCraft/"
		println "Copy that directory to any machine and run SimpleCraft.exe (Windows) or bin/SimpleCraft (Linux)."
	}
}
